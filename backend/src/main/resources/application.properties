# Server Config
server.port=8080

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/the_chakra_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Secret
jwt.secret=${JWT_SECRET:change-this-jwt-secret-in-env-change-this-jwt-secret-in-env-change-this-jwt-secret}
jwt.expiration=86400000
jwt.refreshExpirationMs=${JWT_REFRESH_EXPIRATION_MS:86400000}

# Root authority shared secret (MUST be overridden per environment)
chakra.root-secret=${ROOT_SECRET:CHAKRA_ADMIN_777}

# Live Mail Configuration (Root Authority Active)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true

# CORS origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
